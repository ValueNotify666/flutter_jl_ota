// android/build.gradle 文件最顶部
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}
group = "com.futurpals.flutter_jl_ota"
version = "1.0.1"

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.7.3")
    }
}

def getCurrentProjectDir() {
    String result = ""
    rootProject.allprojects { project ->
        if (project.properties.get("identityPath").toString() == ":flutter_jl_ota") {
            result = project.properties.get("projectDir").toString()
        }
    }
    return result
}

rootProject.allprojects {
    def dir = getCurrentProjectDir()
    repositories {
        google()
        mavenCentral()
        maven { // 添加这个指向本地的仓库目录
            url "$dir/aar/repo"
        }
    }
}

apply plugin: "com.android.library"
apply plugin: 'maven-publish'
publishing {
    publications {
        aar(MavenPublication) {
            groupId = 'com.jl'
            artifactId = 'jl_bt_ota'
            version = '1.10.0'
            // 指定本地 .aar 文件的路径
            artifact("libs/jl_bt_ota_V1.10.0_10932-release.aar")
        }
    }
    repositories {
        maven {
            url = uri("file://${rootProject.projectDir}/aar/repo")
        }
    }
}
android {
    namespace = "com.futurpals.flutter_jl_ota"

    compileSdk = 35

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    defaultConfig {
        minSdk = 21
    }



    dependencies {
        testImplementation("junit:junit:4.13.2")
        testImplementation("org.mockito:mockito-core:5.2.0")
        implementation 'androidx.annotation:annotation:1.9.1'
        implementation 'androidx.appcompat:appcompat:1.7.0'
//        implementation 'com.jl:jl-bt-ota:1.10.0'
        /// 需要通过发布 local maven 避免flutter module打包的aar在安卓原生进行aar集成时找不到jl ota
        implementation 'com.jl:jl_bt_ota:1.10.0'

        compileOnly files("$flutterRoot/bin/cache/artifacts/engine/android-arm/flutter.jar")
    }

    testOptions {
        unitTests.all {
            testLogging {
                events "passed", "skipped", "failed", "standardOut", "standardError"
                outputs.upToDateWhen { false }
                showStandardStreams = true
            }
        }
    }
}
